<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0077b5 0%, #005885 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .info-box {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
        }

        .info-box strong {
            color: #0077b5;
            display: block;
            margin-bottom: 10px;
        }

        .code-display {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-left: 4px solid #0077b5;
            padding-left: 12px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #0077b5;
        }

        .iframe-container {
            border: 2px solid #ddd;
            border-radius: 8px;
            min-height: 400px;
            background: #f8f9fa;
            overflow: auto;
            padding: 10px;
        }

        button {
            background: linear-gradient(135deg, #0077b5 0%, #005885 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 119, 181, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #0077b5;
            max-height: 500px;
            overflow-y: auto;
        }

        .results h3 {
            color: #0077b5;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .data-item {
            margin-bottom: 15px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .data-item strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-item span {
            color: #555;
            word-wrap: break-word;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-top: 15px;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3c3;
            margin-top: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 LinkedIn Post Extractor</h1>
            <p>Pega el código del iframe de LinkedIn y extrae su información</p>
        </div>

        <div class="content">
            <div class="section">
                <h2>1. Pega el código del iframe</h2>
                <textarea id="iframeCode" placeholder='<iframe src="https://www.linkedin.com/embed/feed/update/..." height="..." width="..." frameborder="0" allowfullscreen="" title="..."></iframe>'></textarea>
                
                <div class="button-group">
                    <button onclick="renderIframe()">� Renderizar Iframe</button>
                    <button onclick="extractData()">� Extraer Datos</button>
                    <button onclick="clearAll()">🗑️ Limpiar</button>
                </div>

                <div id="message"></div>
            </div>

            <div class="section">
                <h2>2. Vista previa del iframe</h2>
                <div id="iframeContainer" class="iframe-container">
                    <p style="color: #999; text-align: center; padding: 40px;">
                        El iframe aparecerá aquí una vez lo renderices
                    </p>
                </div>
            </div>
        </div>

        <div style="padding: 0 30px 30px 30px;">
            <div id="results"></div>
        </div>
    </div>

    <script>
        let currentIframeUrl = null;
        let postUrn = null;

        function renderIframe() {
            const code = document.getElementById('iframeCode').value.trim();
            const container = document.getElementById('iframeContainer');
            const messageDiv = document.getElementById('message');

            if (!code) {
                showMessage('Por favor, pega el código del iframe o la URL del post primero', 'error');
                return;
            }

            // Extraer URL del iframe o usar directamente si es una URL
            let iframeUrl = '';
            
            if (code.includes('<iframe')) {
                const srcMatch = code.match(/src=["']([^"']+)["']/);
                if (srcMatch) {
                    iframeUrl = srcMatch[1];
                } else {
                    showMessage('No se pudo encontrar la URL en el código del iframe', 'error');
                    return;
                }
            } else if (code.startsWith('http')) {
                iframeUrl = code;
            } else {
                showMessage('Pega el código del iframe completo o la URL del embed/post', 'error');
                return;
            }

            currentIframeUrl = iframeUrl;

            // Extraer URN del post
            const urnMatch = iframeUrl.match(/urn:li:(share|ugcPost|activity):(\d+)/);
            if (urnMatch) {
                postUrn = `urn:li:${urnMatch[1]}:${urnMatch[2]}`;
            }

            // Mostrar la URL extraída
            container.innerHTML = `
                <div style="padding: 20px;">
                    <div style="background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;">
                        <strong style="color: #0077b5; display: block; margin-bottom: 10px;">📋 URL detectada:</strong>
                        <div style="background: #f8f9fa; padding: 10px; border-radius: 4px; word-break: break-all; font-family: monospace; font-size: 12px;">
                            ${iframeUrl}
                        </div>
                    </div>
                    
                    ${postUrn ? `
                        <div style="background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;">
                            <strong style="color: #0077b5; display: block; margin-bottom: 10px;">🔑 Post URN:</strong>
                            <div style="background: #f8f9fa; padding: 10px; border-radius: 4px; word-break: break-all; font-family: monospace; font-size: 12px;">
                                ${postUrn}
                            </div>
                        </div>
                    ` : ''}
                    
                    <div style="background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px solid #ffc107;">
                        <strong style="color: #856404; display: block; margin-bottom: 5px;">ℹ️ Nota:</strong>
                        <p style="color: #856404; margin: 0; font-size: 14px;">
                            LinkedIn bloquea que sus iframes se muestren en sitios externos (X-Frame-Options). 
                            Haz clic en "Extraer Datos" para obtener información de la URL.
                        </p>
                    </div>

                    <div style="margin-top: 20px; padding: 15px; background: #e7f3ff; border-radius: 8px; border: 1px solid #0077b5;">
                        <strong style="color: #0077b5; display: block; margin-bottom: 10px;">💡 Alternativa:</strong>
                        <p style="color: #333; margin: 0 0 10px 0; font-size: 14px;">
                            Para ver el post, abre esta URL directamente en tu navegador:
                        </p>
                        <a href="${iframeUrl}" target="_blank" style="color: #0077b5; word-break: break-all; font-size: 13px;">
                            ${iframeUrl}
                        </a>
                    </div>
                </div>
            `;
            
            showMessage('URL extraída. Haz clic en "Extraer Datos" para obtener información disponible.', 'success');
        }

        function extractData() {
            if (!currentIframeUrl) {
                showMessage('Primero debes pegar y procesar el código del iframe', 'error');
                return;
            }

            const data = extractFromUrl(currentIframeUrl);
            displayResults(data);
            showMessage('Información extraída de la URL del iframe', 'success');
        }

        function extractFromUrl(url) {
            const data = {
                'URL completa': url,
                'Dominio': new URL(url).hostname,
                'Tipo de contenido': '',
                'URN del post': postUrn || 'No detectado',
                'ID del post': '',
                'Path': new URL(url).pathname
            };

            // Detectar tipo de contenido
            if (url.includes('/embed/feed/update/')) {
                data['Tipo de contenido'] = 'Post/Actualización';
            } else if (url.includes('/embed/feed/')) {
                data['Tipo de contenido'] = 'Feed embed';
            } else if (url.includes('/posts/')) {
                data['Tipo de contenido'] = 'Post directo';
            }

            // Extraer ID numérico si existe
            const numericMatch = url.match(/urn:li:[^:]+:(\d+)/);
            if (numericMatch) {
                data['ID del post'] = numericMatch[1];
            }

            // Información adicional
            data['Método sugerido'] = 'Para extraer el contenido real, necesitas: 1) Extensión de navegador con permisos especiales, 2) LinkedIn API oficial, o 3) Scraping con autenticación';
            
            return data;
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            
            let html = '<div class="results"><h3>📊 Datos Extraídos</h3>';
            
            for (const [key, value] of Object.entries(data)) {
                if (key !== 'html_completo' || value === 'No accesible') {
                    html += `
                        <div class="data-item">
                            <strong>${key}</strong>
                            <span>${value || 'No encontrado'}</span>
                        </div>
                    `;
                }
            }
            
            // Agregar JSON para copiar
            html += `
                <div class="data-item">
                    <strong>JSON (para copiar)</strong>
                    <textarea readonly style="width: 100%; min-height: 100px; margin-top: 10px;">${JSON.stringify(data, null, 2)}</textarea>
                </div>
            `;
            
            html += '</div>';
            resultsDiv.innerHTML = html;
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = type;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
        }

        function clearAll() {
            document.getElementById('iframeCode').value = '';
            document.getElementById('iframeContainer').innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">El iframe aparecerá aquí una vez lo renderices</p>';
            document.getElementById('results').innerHTML = '';
            document.getElementById('message').innerHTML = '';
            currentIframe = null;
        }

        // Ejemplo de código de iframe para probar
        const exampleCode = `<!-- Ejemplo: 
<iframe src="https://www.linkedin.com/embed/feed/update/urn:li:share:1234567890" height="500" width="504" frameborder="0" allowfullscreen="" title="Embedded post"></iframe>
-->`;
    </script>
</body>
</html>
